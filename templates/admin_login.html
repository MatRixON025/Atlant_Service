{% extends "layout.html" %}

{% block body %}
<div class="admin-login-container">
  <div class="admin-login-card">
    <div class="admin-login-header">
      <img src="{{ url_for('static', filename='img/gallery/service-logo.jpg') }}" alt="Atlant Service" class="admin-login-logo">
      <h1>Адмін-панель</h1>
      <p>Atlant Service</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="admin-login-flash">
      {% for category, message in messages %}
      <div class="admin-login-flash__item admin-login-flash__item--{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form class="admin-login-form" method="post" action="{{ url_for('admin_login') }}">
      <div class="form-group">
        <label for="username">Логін</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Введіть логін" 
            required 
            autocomplete="username"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Введіть пароль" 
            required 
            autocomplete="current-password"
          >
          <button type="button" class="password-toggle" onclick="togglePassword()">
            <span id="toggle-icon">Показати</span>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-wrapper">
          <input type="checkbox" id="remember" name="remember">
          <span class="checkmark"></span>
          Запам'ятати мене
        </label>
      </div>

      <button type="submit" class="admin-login-btn">
        Увійти
      </button>
    </form>
  </div>
</div>

<script>
function togglePassword() {
  const passwordInput = document.getElementById('password');
  const toggleIcon = document.getElementById('toggle-icon');
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    toggleIcon.textContent = 'Сховати';
  } else {
    passwordInput.type = 'password';
    toggleIcon.textContent = 'Показати';
  }
}

// Автофокус на поле логіна
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('username').focus();
});
</script>

<style>
.admin-login-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  padding: 2rem;
}

.admin-login-card {
  width: 100%;
  max-width: 420px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  overflow: hidden;
}

.admin-login-header {
  text-align: center;
  padding: 2.5rem 2rem 2rem;
  background: linear-gradient(135deg, rgba(29, 114, 184, 0.05) 0%, rgba(29, 114, 184, 0.1) 100%);
}

.admin-login-logo {
  width: 80px;
  height: auto;
  margin-bottom: 1rem;
  border-radius: 12px;
}

.admin-login-header h1 {
  margin: 0 0 0.5rem;
  font-size: 1.8rem;
  color: var(--primary);
  font-weight: 700;
}

.admin-login-header p {
  margin: 0;
  color: var(--muted);
  font-size: 0.95rem;
}

.admin-login-flash {
  margin: 0 2rem 1.5rem;
}

.admin-login-flash__item {
  padding: 12px 16px;
  border-radius: 10px;
  font-weight: 500;
  font-size: 0.9rem;
  margin-bottom: 0.5rem;
}

.admin-login-flash__item--error {
  background: rgba(220, 53, 69, 0.1);
  color: #721c24;
  border: 1px solid rgba(220, 53, 69, 0.3);
}

.admin-login-flash__item--success {
  background: rgba(40, 167, 69, 0.1);
  color: #155724;
  border: 1px solid rgba(40, 167, 69, 0.3);
}

.admin-login-form {
  padding: 0 2rem 2rem;
}

.form-group {
  margin-bottom: 1.5rem;
}

.form-group label {
  display: block;
  margin-bottom: 0.5rem;
  font-weight: 600;
  color: var(--fg);
  font-size: 0.9rem;
  padding: 1rem 0.5rem 0.5rem;

}

.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.input-icon {
  position: absolute;
  left: 14px;
  font-size: 1.1rem;
  color: var(--muted);
  z-index: 1;
}

.admin-login-form input {
  width: 100%;
  padding: 12px 14px 12px 42px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 1rem;
  transition: all 0.3s ease;
  background: white;
}

.admin-login-form input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(29, 114, 184, 0.1);
}

.password-toggle {
  position: absolute;
  right: 14px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  color: var(--muted);
  transition: color 0.2s ease;
}

.password-toggle:hover {
  color: var(--primary);
}

.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
}

.checkbox-wrapper {
  display: flex;
  align-items: center;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--fg);
}

.checkbox-wrapper input[type="checkbox"] {
  display: none;
}

.checkmark {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  margin-right: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.checkbox-wrapper input[type="checkbox"]:checked + .checkmark {
  background: var(--primary);
  border-color: var(--primary);
}

.checkbox-wrapper input[type="checkbox"]:checked + .checkmark::after {
  content: "✓";
  color: white;
  font-size: 12px;
  font-weight: bold;
}

.admin-login-btn {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.admin-login-btn:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

.admin-login-btn:active {
  transform: translateY(0);
}

@media (max-width: 480px) {
  .admin-login-container {
    padding: 1rem;
  }
  
  .admin-login-card {
    max-width: 100%;
  }
  
  .admin-login-header,
  .admin-login-form {
    padding-left: 1.5rem;
    padding-right: 1.5rem;
  }
}
</style>
{% endblock %}
